<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 140" fill="none">
  <defs>
    <linearGradient id="db-bg" x1="0" y1="0" x2="720" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.13"/>
      <stop offset="60%" stop-color="#1d4ed8" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="db-bar-full" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="db-bar-fast" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="db-accent" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="db-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="720" height="140" rx="16" fill="url(#db-bg)" stroke="#3b82f6" stroke-width="0.6" stroke-opacity="0.25"/>

  <!-- LEFT: Terminal with zi commands -->
  <rect x="28" y="20" width="200" height="100" rx="10" fill="#0f172a" fill-opacity="0.55" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.4"/>
  <circle cx="44" cy="34" r="4" fill="#ef4444" opacity="0.8"/>
  <circle cx="56" cy="34" r="4" fill="#f59e0b" opacity="0.8"/>
  <circle cx="68" cy="34" r="4" fill="#22c55e" opacity="0.8"/>
  <line x1="28" y1="44" x2="228" y2="44" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="40" y="60" font-family="monospace" font-size="8" fill="#60a5fa" opacity="0.9">$ zi load romkatv/powerlevel10k</text>
  <text x="40" y="73" font-family="monospace" font-size="8" fill="#4ade80" opacity="0.8">✔ Loaded (0.08s)</text>
  <text x="40" y="86" font-family="monospace" font-size="8" fill="#60a5fa" opacity="0.9">$ zi ice wait lucid; zi load …</text>
  <text x="40" y="99" font-family="monospace" font-size="8" fill="#4ade80" opacity="0.8">✔ Loaded async (turbo)</text>
  <text x="40" y="112" font-family="monospace" font-size="8" fill="#60a5fa" opacity="0.65">$ _</text>
  <rect x="48" y="105" width="2" height="8" rx="1" fill="#60a5fa" opacity="0.9"/>
  <text x="128" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#3b82f6" opacity="0.9" font-weight="600">Install &amp; manage</text>

  <!-- Connector -->
  <path d="M236 70 L262 70" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.5"/>
  <polygon points="262,67 268,70 262,73" fill="#3b82f6" opacity="0.6"/>

  <!-- CENTER: Startup time comparison -->
  <rect x="275" y="22" width="168" height="96" rx="10" fill="#0f172a" fill-opacity="0.45" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.35"/>
  <text x="359" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#93c5fd" opacity="0.9" font-weight="700">Startup time</text>
  <line x1="275" y1="47" x2="443" y2="47" stroke="#3b82f6" stroke-width="0.4" stroke-opacity="0.3"/>
  <text x="287" y="63" font-family="system-ui,sans-serif" font-size="7.5" fill="#94a3b8" opacity="0.8">without turbo</text>
  <rect x="287" y="67" width="138" height="9" rx="4.5" fill="#1e293b" opacity="0.8"/>
  <rect x="287" y="67" width="138" height="9" rx="4.5" fill="url(#db-bar-full)" opacity="0.75"/>
  <text x="431" y="76" text-anchor="end" font-family="monospace" font-size="7" fill="#fca5a5">0.980s</text>
  <text x="287" y="92" font-family="system-ui,sans-serif" font-size="7.5" fill="#94a3b8" opacity="0.8">with turbo</text>
  <rect x="287" y="96" width="138" height="9" rx="4.5" fill="#1e293b" opacity="0.8"/>
  <rect x="287" y="96" width="22" height="9" rx="4.5" fill="url(#db-bar-fast)" opacity="0.9" filter="url(#db-glow)"/>
  <text x="431" y="105" text-anchor="end" font-family="monospace" font-size="7" fill="#86efac">0.156s</text>
  <text x="359" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#3b82f6" opacity="0.9" font-weight="600">50–80% faster startup</text>

  <!-- Connector -->
  <path d="M451 70 L477 70" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.5"/>
  <polygon points="477,67 483,70 477,73" fill="#3b82f6" opacity="0.6"/>

  <!-- RIGHT: Feature pills -->
  <rect x="490" y="20" width="202" height="100" rx="10" fill="#0f172a" fill-opacity="0.45" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.35"/>
  <text x="591" y="38" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#93c5fd" opacity="0.9" font-weight="700">Built-in features</text>
  <line x1="490" y1="45" x2="692" y2="45" stroke="#3b82f6" stroke-width="0.4" stroke-opacity="0.3"/>
  <!-- Feature rows -->
  <rect x="502" y="52" width="8" height="8" rx="4" fill="#60a5fa" opacity="0.8"/>
  <text x="516" y="60" font-family="system-ui,sans-serif" font-size="8" fill="#e2e8f0" opacity="0.85">Annexes &amp; packages</text>
  <rect x="502" y="66" width="8" height="8" rx="4" fill="#60a5fa" opacity="0.8"/>
  <text x="516" y="74" font-family="system-ui,sans-serif" font-size="8" fill="#e2e8f0" opacity="0.85">No root access needed</text>
  <rect x="502" y="80" width="8" height="8" rx="4" fill="#60a5fa" opacity="0.8"/>
  <text x="516" y="88" font-family="system-ui,sans-serif" font-size="8" fill="#e2e8f0" opacity="0.85">Oh-My-Zsh compatible</text>
  <rect x="502" y="94" width="8" height="8" rx="4" fill="#60a5fa" opacity="0.8"/>
  <text x="516" y="102" font-family="system-ui,sans-serif" font-size="8" fill="#e2e8f0" opacity="0.85">Manage completions</text>
  <text x="591" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#3b82f6" opacity="0.9" font-weight="600">Extend everything</text>

  <!-- Decorative dots -->
  <g opacity="0.12">
    <circle cx="20" cy="20" r="1.5" fill="#3b82f6"/>
    <circle cx="700" cy="20" r="1.5" fill="#3b82f6"/>
    <circle cx="20" cy="120" r="1.5" fill="#3b82f6"/>
    <circle cx="700" cy="120" r="1.5" fill="#3b82f6"/>
  </g>
</svg>
