<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 140" fill="none">
  <defs>
    <linearGradient id="db-bg" x1="0" y1="0" x2="720" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#23c88a" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#1b9e6e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#50df8e" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="db-bar" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#23c88a"/>
      <stop offset="100%" stop-color="#50df8e"/>
    </linearGradient>
    <filter id="db-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="140" rx="16" fill="url(#db-bg)" stroke="#23c88a" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- LEFT: Terminal prompt with zi load -->
  <rect x="28" y="24" width="188" height="92" rx="10" fill="#23c88a" fill-opacity="0.07" stroke="#23c88a" stroke-width="0.8" stroke-opacity="0.3"/>
  <circle cx="43" cy="38" r="3.5" fill="#ff5f56" opacity="0.7"/>
  <circle cx="53" cy="38" r="3.5" fill="#ffbd2e" opacity="0.7"/>
  <circle cx="63" cy="38" r="3.5" fill="#27c93f" opacity="0.7"/>
  <line x1="28" y1="48" x2="216" y2="48" stroke="#23c88a" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="40" y="64" font-family="monospace" font-size="8.5" fill="#50df8e" opacity="0.9">$ zi load romkatv/powerlevel10k</text>
  <text x="40" y="77" font-family="monospace" font-size="8.5" fill="#7feca2" opacity="0.7">$ zi ice wait lucid</text>
  <text x="40" y="90" font-family="monospace" font-size="8.5" fill="#50df8e" opacity="0.8">$ zi load zsh-users/zsh-syntax…</text>
  <text x="40" y="103" font-family="monospace" font-size="8.5" fill="#23c88a" opacity="0.6">$ zi snippet OMZ::lib/git.zsh</text>
  <rect x="40" y="107" width="2" height="7" rx="1" fill="#50df8e" opacity="0.8"/>
  <text x="122" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#23c88a" opacity="0.9" font-weight="600">Install &amp; configure</text>

  <!-- Connector -->
  <path d="M224 70 L252 70" stroke="#23c88a" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.4"/>
  <polygon points="252,67 258,70 252,73" fill="#23c88a" opacity="0.5"/>

  <!-- CENTER: Turbo / speed bars -->
  <rect x="265" y="28" width="182" height="84" rx="10" fill="#23c88a" fill-opacity="0.06" stroke="#23c88a" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="356" y="46" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#23c88a" opacity="0.7" font-weight="600">Turbo mode startup</text>
  <!-- Progress bars -->
  <rect x="280" y="54" width="148" height="7" rx="3.5" fill="#23c88a" fill-opacity="0.1"/>
  <rect x="280" y="54" width="148" height="7" rx="3.5" fill="url(#db-bar)" opacity="0.7"/>
  <text x="280" y="76" font-family="monospace" font-size="7.5" fill="#ff5f56" opacity="0.6">without turbo  0.980s</text>
  <rect x="280" y="80" width="148" height="7" rx="3.5" fill="#23c88a" fill-opacity="0.1"/>
  <rect x="280" y="80" width="24" height="7" rx="3.5" fill="url(#db-bar)" opacity="0.85" filter="url(#db-glow)"/>
  <text x="280" y="102" font-family="monospace" font-size="7.5" fill="#50df8e" opacity="0.9">with turbo     0.156s</text>
  <text x="356" y="124" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#23c88a" opacity="0.9" font-weight="600">50–80% faster startup</text>

  <!-- Connector -->
  <path d="M455 70 L482 70" stroke="#23c88a" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.4"/>
  <polygon points="482,67 488,70 482,73" fill="#23c88a" opacity="0.5"/>

  <!-- RIGHT: Ecosystem icons -->
  <rect x="495" y="24" width="198" height="92" rx="10" fill="#23c88a" fill-opacity="0.07" stroke="#23c88a" stroke-width="0.8" stroke-opacity="0.35"/>
  <!-- Annex -->
  <rect x="510" y="38" width="48" height="28" rx="6" fill="#23c88a" fill-opacity="0.15" stroke="#23c88a" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="534" y="56" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#50df8e" opacity="0.9">annex</text>
  <!-- Package -->
  <rect x="570" y="38" width="48" height="28" rx="6" fill="#23c88a" fill-opacity="0.15" stroke="#23c88a" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="594" y="56" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#50df8e" opacity="0.9">package</text>
  <!-- Plugin -->
  <rect x="630" y="38" width="48" height="28" rx="6" fill="#23c88a" fill-opacity="0.15" stroke="#23c88a" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="654" y="56" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#50df8e" opacity="0.9">plugin</text>
  <!-- Connecting lines -->
  <line x1="534" y1="66" x2="534" y2="80" stroke="#23c88a" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="594" y1="66" x2="594" y2="80" stroke="#23c88a" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="654" y1="66" x2="654" y2="80" stroke="#23c88a" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="534" y1="80" x2="654" y2="80" stroke="#23c88a" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="534" cy="80" r="3" fill="#23c88a" opacity="0.6"/>
  <circle cx="594" cy="80" r="3" fill="#23c88a" opacity="0.6"/>
  <circle cx="654" cy="80" r="3" fill="#23c88a" opacity="0.6"/>
  <line x1="594" y1="80" x2="594" y2="94" stroke="#23c88a" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="594" cy="96" r="4" fill="#23c88a" opacity="0.7" filter="url(#db-glow)"/>
  <text x="594" y="118" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#23c88a" opacity="0.9" font-weight="600">Extend everything</text>

  <!-- Decorative dots -->
  <g opacity="0.07">
    <circle cx="20" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="40" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="680" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="700" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="20" cy="120" r="1.5" fill="#23c88a"/>
    <circle cx="700" cy="120" r="1.5" fill="#23c88a"/>
  </g>
</svg>
