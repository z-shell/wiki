<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 140" fill="none">
  <defs>
    <linearGradient id="eb-bg" x1="0" y1="0" x2="720" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#23c88a" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#1b9e6e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#50df8e" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="eb-pill" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#50df8e"/>
      <stop offset="100%" stop-color="#23c88a"/>
    </linearGradient>
    <filter id="eb-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="140" rx="16" fill="url(#eb-bg)" stroke="#23c88a" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- LEFT: Annexes pillar -->
  <rect x="32" y="24" width="176" height="92" rx="10" fill="#23c88a" fill-opacity="0.07" stroke="#23c88a" stroke-width="0.8" stroke-opacity="0.35"/>
  <!-- Puzzle pieces -->
  <path d="M80 46 L96 46 L96 50 C96 53,101 53,101 50 L101 46 L116 46 L116 62 L112 62 C109 62,109 67,112 67 L116 67 L116 82 L80 82 Z" fill="#23c88a" opacity="0.75"/>
  <path d="M116 54 L116 46 L132 46 L132 50 C132 53,137 53,137 50 L137 46 L153 46 L153 82 L116 82 L116 77 C116 74,111 74,111 77 L111 82 L80 82" fill="#50df8e" opacity="0.4"/>
  <text x="120" y="102" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#23c88a" opacity="0.9" font-weight="600">Annexes</text>
  <text x="120" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#23c88a" opacity="0.65">hooks · bin-gem-node · rust</text>

  <!-- Connector -->
  <path d="M216 70 L244 70" stroke="#23c88a" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.4"/>
  <polygon points="244,67 250,70 244,73" fill="#23c88a" opacity="0.5"/>

  <!-- CENTER: Packages pillar -->
  <rect x="258" y="24" width="204" height="92" rx="10" fill="#23c88a" fill-opacity="0.07" stroke="#23c88a" stroke-width="0.8" stroke-opacity="0.35"/>
  <!-- Box icon -->
  <path d="M330 42 L390 42 L390 88 L330 88 Z" fill="#23c88a" fill-opacity="0.12" stroke="#23c88a" stroke-width="1" stroke-opacity="0.4"/>
  <path d="M330 42 L360 52 L390 42" stroke="#23c88a" stroke-width="1.2" stroke-opacity="0.5" fill="none"/>
  <path d="M360 52 L360 88" stroke="#23c88a" stroke-width="1" stroke-dasharray="3 2" stroke-opacity="0.4"/>
  <!-- Package labels -->
  <rect x="339" y="60" width="42" height="12" rx="6" fill="url(#eb-pill)" opacity="0.7"/>
  <text x="360" y="69.5" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">fzf</text>
  <rect x="339" y="76" width="42" height="12" rx="6" fill="url(#eb-pill)" opacity="0.5"/>
  <text x="360" y="85.5" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">neovim</text>
  <text x="360" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#23c88a" opacity="0.9" font-weight="600">Packages</text>
  <text x="360" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#23c88a" opacity="0.65">curated · ready-to-use</text>

  <!-- Connector -->
  <path d="M470 70 L498 70" stroke="#23c88a" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.4"/>
  <polygon points="498,67 504,70 498,73" fill="#23c88a" opacity="0.5"/>

  <!-- RIGHT: Plugins pillar -->
  <rect x="512" y="24" width="180" height="92" rx="10" fill="#23c88a" fill-opacity="0.07" stroke="#23c88a" stroke-width="0.8" stroke-opacity="0.35"/>
  <!-- Plugin nodes -->
  <circle cx="602" cy="52" r="11" fill="url(#eb-pill)" opacity="0.85" filter="url(#eb-glow)"/>
  <text x="602" y="55.5" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#fff" font-weight="700">zi</text>
  <circle cx="556" cy="78" r="8" fill="#23c88a" opacity="0.6"/>
  <circle cx="580" cy="84" r="7" fill="#50df8e" opacity="0.55"/>
  <circle cx="620" cy="82" r="9" fill="#23c88a" opacity="0.5"/>
  <circle cx="648" cy="74" r="8" fill="#50df8e" opacity="0.6"/>
  <line x1="602" y1="63" x2="556" y2="70" stroke="#23c88a" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="602" y1="63" x2="580" y2="77" stroke="#23c88a" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="602" y1="63" x2="620" y2="73" stroke="#23c88a" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="602" y1="63" x2="648" y2="66" stroke="#23c88a" stroke-width="1" stroke-opacity="0.35"/>
  <text x="602" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#23c88a" opacity="0.9" font-weight="600">Plugins</text>
  <text x="602" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7.5" fill="#23c88a" opacity="0.65">syntax · completions · themes</text>

  <!-- Decorative dots -->
  <g opacity="0.07">
    <circle cx="20" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="40" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="680" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="700" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="20" cy="120" r="1.5" fill="#23c88a"/>
    <circle cx="700" cy="120" r="1.5" fill="#23c88a"/>
  </g>
</svg>
