  <text x="530" y="70" font-family="monospace" font-size="8" fill="#fde68a" opacity="0.9">zsh-autosuggestions</text>
  <rect x="519" y="76" width="5" height="5" rx="2" fill="#fbbf24" opacity="0.85"/>
