  <rect x="519" y="88" width="5" height="5" rx="2" fill="#fbbf24" opacity="0.85"/>
  <text x="530" y="94" font-family="monospace" font-size="8" fill="#fde68a" opacity="0.9">diff-so-fancy</text>
