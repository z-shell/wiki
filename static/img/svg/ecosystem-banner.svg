  <text x="312" y="93" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#fed7aa">any-gem</text>
  <rect x="358" y="78" width="90" height="22" rx="5" fill="#f97316" fill-opacity="0.15" stroke="#fb923c" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="403" y="93" text-anchor="middle" font-family="monospace" font-size="7" fill="#fed7aa">zsh-completions</text>
  <text x="360" y="132" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#fb923c" opacity="0.9" font-weight="600">Curated, ready-to-use</text>

