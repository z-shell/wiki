<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="syn-bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#23c88a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#50df8e" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="20" fill="url(#syn-bg)"/>
  <!-- Terminal window frame -->
  <rect x="14" y="18" width="92" height="84" rx="8" fill="#1a1e2e" opacity="0.85"/>
  <!-- Title bar -->
  <rect x="14" y="18" width="92" height="14" rx="8" fill="#252a3a" opacity="0.9"/>
  <rect x="14" y="26" width="92" height="6" fill="#252a3a" opacity="0.9"/>
  <circle cx="26" cy="25" r="3" fill="#ff5f57" opacity="0.8"/>
  <circle cx="36" cy="25" r="3" fill="#febc2e" opacity="0.8"/>
  <circle cx="46" cy="25" r="3" fill="#28c840" opacity="0.8"/>
  <!-- Code lines with syntax colors -->
  <!-- Line 1: keyword + function name -->
  <rect x="24" y="40" width="24" height="4" rx="2" fill="#7feca2" opacity="0.9"/>
  <rect x="52" y="40" width="32" height="4" rx="2" fill="#86f4a6" opacity="0.7"/>
  <rect x="86" y="40" width="6" height="4" rx="2" fill="#5ae39c" opacity="0.5"/>
  <!-- Line 2: string value -->
  <rect x="30" y="50" width="16" height="4" rx="2" fill="#50df8e" opacity="0.6"/>
  <rect x="50" y="50" width="40" height="4" rx="2" fill="#ffd580" opacity="0.7"/>
  <!-- Line 3: variable + operator -->
  <rect x="30" y="60" width="20" height="4" rx="2" fill="#7feca2" opacity="0.8"/>
  <rect x="54" y="60" width="8" height="4" rx="2" fill="#fff" opacity="0.4"/>
  <rect x="66" y="60" width="14" height="4" rx="2" fill="#86f4a6" opacity="0.6"/>
  <!-- Line 4: comment -->
  <rect x="24" y="70" width="56" height="4" rx="2" fill="#7feca2" opacity="0.3"/>
  <!-- Line 5: command -->
  <rect x="24" y="80" width="18" height="4" rx="2" fill="#23c88a" opacity="0.9"/>
  <rect x="46" y="80" width="28" height="4" rx="2" fill="#50df8e" opacity="0.5"/>
  <!-- Cursor blink -->
  <rect x="78" y="80" width="2" height="5" fill="#50df8e" opacity="0.8"/>
  <!-- Paintbrush accent -->
  <g transform="translate(88, 10) rotate(30)" opacity="0.4">
    <rect x="0" y="0" width="4" height="16" rx="2" fill="#50df8e"/>
    <polygon points="0,16 4,16 2,22" fill="#23c88a"/>
  </g>
</svg>
