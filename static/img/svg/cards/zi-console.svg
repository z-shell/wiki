<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="con-bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#23c88a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#50df8e" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="con-panel" x1="14" y1="18" x2="106" y2="102" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1e2e"/>
      <stop offset="100%" stop-color="#141722"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="20" fill="url(#con-bg)"/>
  <!-- Terminal window -->
  <rect x="10" y="14" width="100" height="92" rx="8" fill="url(#con-panel)" opacity="0.9"/>
  <!-- Title bar -->
  <rect x="10" y="14" width="100" height="14" rx="8" fill="#252a3a"/>
  <rect x="10" y="22" width="100" height="6" fill="#252a3a"/>
  <circle cx="22" cy="21" r="3" fill="#ff5f57" opacity="0.8"/>
  <circle cx="32" cy="21" r="3" fill="#febc2e" opacity="0.8"/>
  <circle cx="42" cy="21" r="3" fill="#28c840" opacity="0.8"/>
  <text x="72" y="23" text-anchor="middle" fill="#7feca2" font-family="monospace" font-size="7" opacity="0.5">zi console</text>
  <!-- Sidebar panel -->
  <rect x="12" y="30" width="30" height="72" rx="2" fill="#1e2235" opacity="0.8"/>
  <!-- Sidebar items -->
  <rect x="16" y="36" width="22" height="6" rx="3" fill="#23c88a" opacity="0.3"/>
  <text x="27" y="41" text-anchor="middle" fill="#50df8e" font-family="monospace" font-size="5" opacity="0.8">plugins</text>

  <rect x="16" y="46" width="22" height="6" rx="3" fill="#23c88a" opacity="0.15"/>
  <text x="27" y="51" text-anchor="middle" fill="#7feca2" font-family="monospace" font-size="5" opacity="0.5">snippets</text>

  <rect x="16" y="56" width="22" height="6" rx="3" fill="#23c88a" opacity="0.15"/>
  <text x="27" y="61" text-anchor="middle" fill="#7feca2" font-family="monospace" font-size="5" opacity="0.5">ice</text>

  <rect x="16" y="66" width="22" height="6" rx="3" fill="#23c88a" opacity="0.15"/>
  <text x="27" y="71" text-anchor="middle" fill="#7feca2" font-family="monospace" font-size="5" opacity="0.5">report</text>

  <!-- Selection indicator -->
  <rect x="14" y="36" width="2" height="6" rx="1" fill="#23c88a" opacity="0.9"/>

  <!-- Main content area -->
  <!-- Plugin list items -->
  <rect x="46" y="34" width="58" height="8" rx="3" fill="#23c88a" opacity="0.12"/>
  <circle cx="52" cy="38" r="2" fill="#28c840" opacity="0.8"/>
  <rect x="56" y="36" width="28" height="3" rx="1.5" fill="#50df8e" opacity="0.6"/>
  <rect x="88" y="36" width="12" height="3" rx="1.5" fill="#7feca2" opacity="0.3"/>

  <rect x="46" y="46" width="58" height="8" rx="3" fill="#23c88a" opacity="0.08"/>
  <circle cx="52" cy="50" r="2" fill="#28c840" opacity="0.8"/>
  <rect x="56" y="48" width="34" height="3" rx="1.5" fill="#50df8e" opacity="0.5"/>

  <rect x="46" y="58" width="58" height="8" rx="3" fill="#23c88a" opacity="0.08"/>
  <circle cx="52" cy="62" r="2" fill="#febc2e" opacity="0.7"/>
  <rect x="56" y="60" width="22" height="3" rx="1.5" fill="#50df8e" opacity="0.4"/>
  <rect x="82" y="60" width="16" height="3" rx="1.5" fill="#ffd580" opacity="0.3"/>

  <rect x="46" y="70" width="58" height="8" rx="3" fill="#23c88a" opacity="0.08"/>
  <circle cx="52" cy="74" r="2" fill="#28c840" opacity="0.8"/>
  <rect x="56" y="72" width="30" height="3" rx="1.5" fill="#50df8e" opacity="0.4"/>

  <!-- Status bar at bottom -->
  <rect x="12" y="88" width="96" height="14" rx="2" fill="#252a3a" opacity="0.6"/>
  <text x="20" y="97" fill="#23c88a" font-family="monospace" font-size="6" opacity="0.6">4 loaded</text>
  <text x="70" y="97" fill="#7feca2" font-family="monospace" font-size="6" opacity="0.4">↑↓ navigate</text>
</svg>
