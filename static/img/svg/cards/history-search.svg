<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="hist-bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#23c88a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#50df8e" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="hist-glass" x1="40" y1="30" x2="80" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#50df8e"/>
      <stop offset="100%" stop-color="#23c88a"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="20" fill="url(#hist-bg)"/>
  <!-- History list lines (background) -->
  <rect x="16" y="24" width="88" height="10" rx="5" fill="#23c88a" opacity="0.08"/>
  <rect x="24" y="26" width="30" height="2" rx="1" fill="#7feca2" opacity="0.3"/>
  <rect x="58" y="26" width="20" height="2" rx="1" fill="#7feca2" opacity="0.2"/>
  <rect x="24" y="30" width="18" height="2" rx="1" fill="#7feca2" opacity="0.2"/>

  <rect x="16" y="38" width="88" height="10" rx="5" fill="#23c88a" opacity="0.08"/>
  <rect x="24" y="40" width="40" height="2" rx="1" fill="#7feca2" opacity="0.3"/>
  <rect x="24" y="44" width="24" height="2" rx="1" fill="#7feca2" opacity="0.2"/>

  <!-- Highlighted / matched result -->
  <rect x="16" y="52" width="88" height="14" rx="5" fill="#23c88a" opacity="0.2" stroke="#23c88a" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="24" y="56" width="14" height="3" rx="1.5" fill="#50df8e" opacity="0.7"/>
  <rect x="40" y="56" width="22" height="3" rx="1.5" fill="#23c88a" opacity="0.9"/>
  <rect x="64" y="56" width="16" height="3" rx="1.5" fill="#50df8e" opacity="0.5"/>
  <rect x="24" y="61" width="32" height="2" rx="1" fill="#7feca2" opacity="0.35"/>
  <!-- Match highlight -->
  <rect x="39" y="55" width="24" height="5" rx="2" fill="#23c88a" opacity="0.15" stroke="#23c88a" stroke-width="0.5" stroke-opacity="0.5"/>

  <rect x="16" y="70" width="88" height="10" rx="5" fill="#23c88a" opacity="0.08"/>
  <rect x="24" y="72" width="36" height="2" rx="1" fill="#7feca2" opacity="0.3"/>
  <rect x="24" y="76" width="22" height="2" rx="1" fill="#7feca2" opacity="0.2"/>

  <rect x="16" y="84" width="88" height="10" rx="5" fill="#23c88a" opacity="0.06"/>
  <rect x="24" y="86" width="28" height="2" rx="1" fill="#7feca2" opacity="0.2"/>
  <rect x="24" y="90" width="16" height="2" rx="1" fill="#7feca2" opacity="0.15"/>

  <!-- Magnifying glass -->
  <circle cx="82" cy="42" r="16" fill="none" stroke="url(#hist-glass)" stroke-width="3" opacity="0.8"/>
  <circle cx="82" cy="42" r="12" fill="#23c88a" opacity="0.06"/>
  <line x1="93" y1="54" x2="104" y2="65" stroke="#23c88a" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- Search sparkle -->
  <circle cx="76" cy="36" r="1.5" fill="#fff" opacity="0.5"/>
  <!-- Multi-word hint inside lens -->
  <rect x="73" y="40" width="8" height="2" rx="1" fill="#50df8e" opacity="0.5"/>
  <rect x="83" y="40" width="6" height="2" rx="1" fill="#7feca2" opacity="0.4"/>
</svg>
