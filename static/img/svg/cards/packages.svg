<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="pkg-bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#23c88a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#50df8e" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="pkg-face" x1="30" y1="30" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#50df8e"/>
      <stop offset="100%" stop-color="#23c88a"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="20" fill="url(#pkg-bg)"/>
  <!-- 3D Box - top face -->
  <polygon points="60,22 92,38 60,54 28,38" fill="#86f4a6" opacity="0.7"/>
  <!-- 3D Box - right face -->
  <polygon points="60,54 92,38 92,72 60,88" fill="url(#pkg-face)" opacity="0.8"/>
  <!-- 3D Box - left face -->
  <polygon points="60,54 28,38 28,72 60,88" fill="#23c88a" opacity="0.75"/>
  <!-- Box tape / seal line top -->
  <line x1="60" y1="22" x2="60" y2="54" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  <!-- Box tape / seal line front -->
  <line x1="60" y1="54" x2="60" y2="88" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
  <!-- Box edges -->
  <line x1="28" y1="38" x2="28" y2="72" stroke="#23c88a" stroke-width="1" opacity="0.4"/>
  <line x1="92" y1="38" x2="92" y2="72" stroke="#23c88a" stroke-width="1" opacity="0.4"/>
  <line x1="28" y1="72" x2="60" y2="88" stroke="#23c88a" stroke-width="1" opacity="0.4"/>
  <line x1="92" y1="72" x2="60" y2="88" stroke="#23c88a" stroke-width="1" opacity="0.4"/>
  <!-- Download arrow above box -->
  <line x1="60" y1="8" x2="60" y2="18" stroke="#50df8e" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <polyline points="55,14 60,19 65,14" stroke="#50df8e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
  <!-- Small config dots on right face -->
  <circle cx="72" cy="52" r="2" fill="#fff" opacity="0.3"/>
  <circle cx="80" cy="56" r="2" fill="#fff" opacity="0.25"/>
  <circle cx="76" cy="62" r="2" fill="#fff" opacity="0.2"/>
  <!-- Label -->
  <rect x="30" y="94" width="60" height="16" rx="8" fill="#23c88a" opacity="0.15"/>
  <text x="60" y="105" text-anchor="middle" fill="#23c88a" font-family="sans-serif" font-size="8" font-weight="600" opacity="0.6">PRE-CONFIGURED</text>
</svg>
