<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 140" fill="none">
  <defs>
    <linearGradient id="cmb-bg" x1="0" y1="0" x2="720" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#23c88a" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#1b9e6e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#50df8e" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="cmb-node" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#50df8e"/>
      <stop offset="100%" stop-color="#23c88a"/>
    </linearGradient>
    <filter id="cmb-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="140" rx="16" fill="url(#cmb-bg)" stroke="#23c88a" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Central hub -->
  <circle cx="360" cy="66" r="20" fill="url(#cmb-node)" opacity="0.9" filter="url(#cmb-glow)"/>
  <text x="360" y="70" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#fff" font-weight="700">Z-Shell</text>

  <!-- Node: Contributing (top-left) -->
  <circle cx="200" cy="38" r="13" fill="#23c88a" opacity="0.7"/>
  <text x="200" y="41.5" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">🤝</text>
  <line x1="213" y1="44" x2="341" y2="58" stroke="#23c88a" stroke-width="1.2" stroke-opacity="0.4"/>
  <text x="200" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#23c88a" opacity="0.85" font-weight="600">Contributing</text>

  <!-- Node: ZUnit (top-right) -->
  <circle cx="520" cy="38" r="13" fill="#50df8e" opacity="0.7"/>
  <text x="520" y="41.5" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">🧪</text>
  <line x1="507" y1="44" x2="379" y2="58" stroke="#23c88a" stroke-width="1.2" stroke-opacity="0.4"/>
  <text x="520" y="60" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#23c88a" opacity="0.85" font-weight="600">ZUnit</text>

  <!-- Node: Gallery (bottom-left) -->
  <circle cx="200" cy="96" r="13" fill="#7feca2" opacity="0.7"/>
  <text x="200" y="99.5" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">🖼</text>
  <line x1="213" y1="90" x2="341" y2="72" stroke="#23c88a" stroke-width="1.2" stroke-opacity="0.4"/>
  <text x="200" y="117" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#23c88a" opacity="0.85" font-weight="600">Gallery</text>

  <!-- Node: ZSH Guide (bottom-right) -->
  <circle cx="520" cy="96" r="13" fill="#23c88a" opacity="0.6"/>
  <text x="520" y="99.5" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">📖</text>
  <line x1="507" y1="90" x2="379" y2="72" stroke="#23c88a" stroke-width="1.2" stroke-opacity="0.4"/>
  <text x="520" y="117" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#23c88a" opacity="0.85" font-weight="600">ZSH Guide</text>

  <!-- Far left: people icon group -->
  <circle cx="72" cy="52" r="9" fill="#23c88a" opacity="0.5"/>
  <circle cx="90" cy="48" r="9" fill="#50df8e" opacity="0.45"/>
  <circle cx="56" cy="48" r="9" fill="#7feca2" opacity="0.4"/>
  <line x1="100" y1="52" x2="187" y2="46" stroke="#23c88a" stroke-width="1" stroke-dasharray="3 2" stroke-opacity="0.35"/>
  <text x="72" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#23c88a" opacity="0.8" font-weight="600">Community</text>

  <!-- Far right: stars/celebrate -->
  <text x="628" y="44" font-size="12" fill="#ffbd2e" opacity="0.7">✦</text>
  <text x="648" y="58" font-size="9" fill="#ffbd2e" opacity="0.55">✦</text>
  <text x="618" y="64" font-size="8" fill="#7feca2" opacity="0.5">✦</text>
  <text x="655" y="76" font-size="11" fill="#23c88a" opacity="0.45">✦</text>
  <text x="636" y="86" font-size="8" fill="#ffbd2e" opacity="0.5">✦</text>
  <text x="648" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#23c88a" opacity="0.8" font-weight="600">Get involved</text>

  <!-- Decorative dots -->
  <g opacity="0.07">
    <circle cx="20" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="40" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="680" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="700" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="20" cy="120" r="1.5" fill="#23c88a"/>
    <circle cx="700" cy="120" r="1.5" fill="#23c88a"/>
  </g>
</svg>
