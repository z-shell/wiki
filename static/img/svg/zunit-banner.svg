<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 140" fill="none">
  <defs>
    <linearGradient id="zb-bg" x1="0" y1="0" x2="720" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#23c88a" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#1b9e6e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#50df8e" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="zb-pass" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#23c88a"/>
      <stop offset="100%" stop-color="#50df8e"/>
    </linearGradient>
    <filter id="zb-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="140" rx="16" fill="url(#zb-bg)" stroke="#23c88a" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- LEFT: @test block -->
  <rect x="28" y="22" width="198" height="96" rx="10" fill="#23c88a" fill-opacity="0.07" stroke="#23c88a" stroke-width="0.8" stroke-opacity="0.3"/>
  <circle cx="43" cy="36" r="3.5" fill="#ff5f56" opacity="0.7"/>
  <circle cx="53" cy="36" r="3.5" fill="#ffbd2e" opacity="0.7"/>
  <circle cx="63" cy="36" r="3.5" fill="#27c93f" opacity="0.7"/>
  <line x1="28" y1="46" x2="226" y2="46" stroke="#23c88a" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="40" y="62" font-family="monospace" font-size="8" fill="#50df8e" opacity="0.9">@test 'addition works' {</text>
  <text x="40" y="75" font-family="monospace" font-size="8" fill="#7feca2" opacity="0.75">  local result=$(( 1 + 1 ))</text>
  <text x="40" y="88" font-family="monospace" font-size="8" fill="#50df8e" opacity="0.85">  assert ${result} equals 2</text>
  <text x="40" y="101" font-family="monospace" font-size="8" fill="#7feca2" opacity="0.7">}</text>
  <text x="127" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#23c88a" opacity="0.9" font-weight="600">Write tests</text>

  <!-- Connector -->
  <path d="M234 70 L262 70" stroke="#23c88a" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.4"/>
  <polygon points="262,67 268,70 262,73" fill="#23c88a" opacity="0.5"/>

  <!-- CENTER: Run output -->
  <rect x="276" y="26" width="170" height="88" rx="10" fill="#23c88a" fill-opacity="0.06" stroke="#23c88a" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="361" y="44" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" fill="#23c88a" opacity="0.7" font-weight="600">$ zunit</text>
  <line x1="276" y1="50" x2="446" y2="50" stroke="#23c88a" stroke-width="0.5" stroke-opacity="0.25"/>
  <!-- test rows -->
  <rect x="288" y="57" width="6" height="6" rx="1" fill="#27c93f" opacity="0.8"/>
  <rect x="298" y="58" width="90" height="5" rx="2.5" fill="#27c93f" opacity="0.2"/>
  <rect x="288" y="68" width="6" height="6" rx="1" fill="#27c93f" opacity="0.8"/>
  <rect x="298" y="69" width="76" height="5" rx="2.5" fill="#27c93f" opacity="0.2"/>
  <rect x="288" y="79" width="6" height="6" rx="1" fill="#27c93f" opacity="0.8"/>
  <rect x="298" y="80" width="104" height="5" rx="2.5" fill="#27c93f" opacity="0.2"/>
  <rect x="288" y="90" width="6" height="6" rx="1" fill="#27c93f" opacity="0.8"/>
  <rect x="298" y="91" width="82" height="5" rx="2.5" fill="#27c93f" opacity="0.2"/>
  <text x="361" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#23c88a" opacity="0.9" font-weight="600">Run tests</text>

  <!-- Connector -->
  <path d="M454 70 L482 70" stroke="#23c88a" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.4"/>
  <polygon points="482,67 488,70 482,73" fill="#23c88a" opacity="0.5"/>

  <!-- RIGHT: Pass badge -->
  <circle cx="596" cy="60" r="36" fill="url(#zb-pass)" fill-opacity="0.10" stroke="#23c88a" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="596" cy="60" r="26" fill="url(#zb-pass)" opacity="0.85" filter="url(#zb-glow)"/>
  <polyline points="582,60 591,70 612,48" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="596" y="106" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#23c88a" opacity="0.85" font-weight="700">4 passed</text>
  <text x="596" y="120" text-anchor="middle" font-family="monospace" font-size="8" fill="#23c88a" opacity="0.6">0 failed · 0 skipped</text>

  <!-- Stars -->
  <text x="555" y="30" font-size="10" fill="#ffbd2e" opacity="0.65">✦</text>
  <text x="635" y="28" font-size="8" fill="#ffbd2e" opacity="0.5">✦</text>
  <text x="645" y="46" font-size="7" fill="#7feca2" opacity="0.45">✦</text>

  <!-- Decorative dots -->
  <g opacity="0.07">
    <circle cx="20" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="40" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="680" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="700" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="20" cy="120" r="1.5" fill="#23c88a"/>
    <circle cx="700" cy="120" r="1.5" fill="#23c88a"/>
  </g>
</svg>
