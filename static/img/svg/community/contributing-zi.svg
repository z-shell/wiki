<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="zi-bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#23c88a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#50df8e" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="zi-gear" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#50df8e"/>
      <stop offset="100%" stop-color="#23c88a"/>
    </linearGradient>
    <filter id="zi-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="120" height="120" rx="20" fill="url(#zi-bg)"/>

  <!-- Gear outline (8 teeth) -->
  <g transform="translate(60,52)" filter="url(#zi-glow)">
    <path d="
      M0,-26 L4,-22 L8,-24 L10,-20 L14,-20 L13,-15 L18,-12 L16,-8
      L20,-4 L17,0 L20,4 L16,8 L18,12 L13,15 L14,20 L10,20
      L8,24 L4,22 L0,26 L-4,22 L-8,24 L-10,20 L-14,20 L-13,15
      L-18,12 L-16,8 L-20,4 L-17,0 L-20,-4 L-16,-8 L-18,-12
      L-13,-15 L-14,-20 L-10,-20 L-8,-24 L-4,-22 Z"
      fill="url(#zi-gear)" opacity="0.75"/>
    <!-- Gear inner ring -->
    <circle cx="0" cy="0" r="12" fill="#0e1a14" fill-opacity="0.35"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#7feca2" stroke-width="1" opacity="0.5"/>
    <!-- Zi text inside gear -->
    <text x="0" y="4.5" text-anchor="middle" font-family="monospace" font-size="10" fill="#fff" font-weight="700" opacity="0.9">zi</text>
  </g>

  <!-- Code lines below gear -->
  <rect x="24" y="88" width="72" height="5" rx="2.5" fill="#50df8e" opacity="0.35"/>
  <rect x="32" y="97" width="56" height="5" rx="2.5" fill="#7feca2" opacity="0.25"/>

  <!-- Small sparkle -->
  <text x="88" y="28" font-size="10" fill="#ffbd2e" opacity="0.65">✦</text>
  <text x="18" y="35" font-size="7" fill="#7feca2" opacity="0.45">✦</text>
</svg>
