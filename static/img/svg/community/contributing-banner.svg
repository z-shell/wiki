<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 140" fill="none">
  <defs>
    <linearGradient id="cb-bg" x1="0" y1="0" x2="720" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#23c88a" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#1b9e6e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#50df8e" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="cb-node" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#50df8e"/>
      <stop offset="100%" stop-color="#23c88a"/>
    </linearGradient>
    <linearGradient id="cb-merge" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#23c88a"/>
      <stop offset="100%" stop-color="#50df8e"/>
    </linearGradient>
    <filter id="cb-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="140" rx="16" fill="url(#cb-bg)" stroke="#23c88a" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- ─── LEFT SECTION: Fork origin ─── -->
  <circle cx="72" cy="50" r="10" fill="url(#cb-node)" opacity="0.9" filter="url(#cb-glow)"/>
  <circle cx="72" cy="50" r="6.5" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
  <text x="72" y="80" text-anchor="middle" font-family="monospace" font-size="9" fill="#23c88a" opacity="0.8">fork</text>
  <line x1="72" y1="60" x2="72" y2="100" stroke="#23c88a" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.5"/>
  <path d="M72 60 Q72 75 50 88" stroke="#7feca2" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M72 60 Q72 75 94 88" stroke="#7feca2" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="50" cy="90" r="6" fill="#23c88a" opacity="0.7"/>
  <circle cx="94" cy="90" r="6" fill="#50df8e" opacity="0.7"/>
  <circle cx="72" cy="102" r="6" fill="#23c88a" opacity="0.5"/>
  <text x="72" y="124" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#23c88a" opacity="0.9" font-weight="600">Fork &amp; branch</text>

  <!-- Connector -->
  <path d="M115 70 L145 70" stroke="#23c88a" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.4"/>
  <polygon points="145,67 151,70 145,73" fill="#23c88a" opacity="0.5"/>

  <!-- ─── CENTER-LEFT: Write code ─── -->
  <rect x="160" y="28" width="160" height="86" rx="10" fill="#23c88a" fill-opacity="0.06" stroke="#23c88a" stroke-width="0.8" stroke-opacity="0.3"/>
  <circle cx="175" cy="42" r="3.5" fill="#ff5f56" opacity="0.7"/>
  <circle cx="185" cy="42" r="3.5" fill="#ffbd2e" opacity="0.7"/>
  <circle cx="195" cy="42" r="3.5" fill="#27c93f" opacity="0.7"/>
  <line x1="160" y1="52" x2="320" y2="52" stroke="#23c88a" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="172" y="60" width="80" height="5" rx="2.5" fill="#50df8e" opacity="0.5"/>
  <rect x="172" y="71" width="55" height="5" rx="2.5" fill="#7feca2" opacity="0.35"/>
  <rect x="180" y="82" width="90" height="5" rx="2.5" fill="#50df8e" opacity="0.4"/>
  <rect x="180" y="93" width="65" height="5" rx="2.5" fill="#7feca2" opacity="0.3"/>
  <rect x="172" y="104" width="45" height="5" rx="2.5" fill="#50df8e" opacity="0.35"/>
  <rect x="222" y="104" width="2" height="6" rx="1" fill="#23c88a" opacity="0.8"/>
  <text x="240" y="126" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#23c88a" opacity="0.9" font-weight="600">Write &amp; commit</text>

  <!-- Connector -->
  <path d="M328 70 L355 70" stroke="#23c88a" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.4"/>
  <polygon points="355,67 361,70 355,73" fill="#23c88a" opacity="0.5"/>

  <!-- ─── CENTER: Pull Request ─── -->
  <rect x="368" y="22" width="140" height="96" rx="10" fill="#23c88a" fill-opacity="0.07" stroke="#23c88a" stroke-width="0.8" stroke-opacity="0.35"/>
  <rect x="378" y="32" width="28" height="14" rx="7" fill="#23c88a" opacity="0.8"/>
  <text x="392" y="42.5" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#fff" font-weight="700">PR</text>
  <rect x="414" y="35" width="82" height="6" rx="3" fill="#50df8e" opacity="0.45"/>
  <line x1="378" y1="52" x2="496" y2="52" stroke="#23c88a" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="378" y="60" width="6" height="5" rx="1" fill="#27c93f" opacity="0.7"/>
  <rect x="388" y="60" width="72" height="5" rx="2.5" fill="#27c93f" opacity="0.25"/>
  <rect x="378" y="70" width="6" height="5" rx="1" fill="#27c93f" opacity="0.7"/>
  <rect x="388" y="70" width="50" height="5" rx="2.5" fill="#27c93f" opacity="0.25"/>
  <rect x="378" y="82" width="6" height="5" rx="1" fill="#ff5f56" opacity="0.5"/>
  <rect x="388" y="82" width="62" height="5" rx="2.5" fill="#ff5f56" opacity="0.15"/>
  <circle cx="382" cy="100" r="5" fill="#23c88a" opacity="0.7"/>
  <polyline points="379,100 381.5,102.5 385,97.5" stroke="#fff" stroke-width="1.3" fill="none"/>
  <circle cx="396" cy="100" r="5" fill="#23c88a" opacity="0.5"/>
  <polyline points="393,100 395.5,102.5 399,97.5" stroke="#fff" stroke-width="1.3" fill="none"/>
  <text x="408" y="103.5" font-family="system-ui,sans-serif" font-size="8" fill="#23c88a" opacity="0.6">reviewed</text>
  <text x="438" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#23c88a" opacity="0.9" font-weight="600">Open pull request</text>

  <!-- Connector -->
  <path d="M516 70 L543 70" stroke="#23c88a" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.4"/>
  <polygon points="543,67 549,70 543,73" fill="#23c88a" opacity="0.5"/>

  <!-- ─── RIGHT: Merge ─── -->
  <circle cx="600" cy="50" r="20" fill="url(#cb-merge)" fill-opacity="0.12" stroke="#23c88a" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="600" cy="50" r="13" fill="url(#cb-merge)" opacity="0.8" filter="url(#cb-glow)"/>
  <circle cx="593" cy="44" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="607" cy="44" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="600" cy="58" r="3" fill="#fff" opacity="0.9"/>
