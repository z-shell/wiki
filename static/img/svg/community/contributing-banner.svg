  <path d="M607 47 Q607 54 600 55" stroke="#fff" stroke-width="1.3" fill="none" opacity="0.7"/>
  <text x="565" y="28" font-size="11" fill="#ffbd2e" opacity="0.7">✦</text>
  <text x="625" y="32" font-size="8" fill="#ffbd2e" opacity="0.6">✦</text>
  <text x="638" y="48" font-size="7" fill="#7feca2" opacity="0.5">✦</text>
  <text x="558" y="58" font-size="7" fill="#7feca2" opacity="0.4">✦</text>
  <rect x="574" y="78" width="52" height="14" rx="7" fill="#23c88a" opacity="0.85"/>
  <text x="600" y="88.5" text-anchor="middle" font-family="monospace" font-size="8" fill="#fff" font-weight="700">merged ✓</text>
  <text x="600" y="124" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#23c88a" opacity="0.9" font-weight="600">Get merged 🎉</text>

  <!-- Decorative dots -->
  <g opacity="0.07">
    <circle cx="20" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="40" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="680" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="700" cy="20" r="1.5" fill="#23c88a"/>
    <circle cx="20" cy="120" r="1.5" fill="#23c88a"/>
    <circle cx="700" cy="120" r="1.5" fill="#23c88a"/>
  </g>
</svg>
