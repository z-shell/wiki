<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="ps-bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#23c88a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#50df8e" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="ps-plug" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#50df8e"/>
      <stop offset="100%" stop-color="#23c88a"/>
    </linearGradient>
    <filter id="ps-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="120" height="120" rx="20" fill="url(#ps-bg)"/>

  <!-- Plug body (left piece) -->
  <g filter="url(#ps-glow)">
    <!-- Left plug body -->
    <rect x="20" y="46" width="38" height="28" rx="6" fill="url(#ps-plug)" opacity="0.8"/>
    <!-- Left plug pins -->
    <rect x="34" y="36" width="6" height="12" rx="3" fill="#50df8e" opacity="0.9"/>
    <rect x="46" y="36" width="6" height="12" rx="3" fill="#50df8e" opacity="0.9"/>
    <!-- Left plug tail -->
    <rect x="14" y="56" width="8" height="8" rx="2" fill="#23c88a" opacity="0.7"/>

    <!-- Right socket body -->
    <rect x="62" y="46" width="38" height="28" rx="6" fill="url(#ps-plug)" opacity="0.6"/>
    <!-- Socket holes -->
    <rect x="72" y="57" width="6" height="6" rx="2" fill="#0e1a14" opacity="0.5"/>
    <rect x="84" y="57" width="6" height="6" rx="2" fill="#0e1a14" opacity="0.5"/>
    <!-- Right tail -->
    <rect x="98" y="56" width="8" height="8" rx="2" fill="#23c88a" opacity="0.7"/>
  </g>

  <!-- Connection sparks in the gap -->
  <line x1="58" y1="58" x2="62" y2="62" stroke="#ffbd2e" stroke-width="1.5" opacity="0.7"/>
  <line x1="58" y1="64" x2="62" y2="60" stroke="#ffbd2e" stroke-width="1.5" opacity="0.5"/>

  <!-- Zsh text label underneath -->
  <rect x="30" y="84" width="60" height="14" rx="7" fill="#23c88a" opacity="0.15"/>
  <text x="60" y="94.5" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#23c88a" opacity="0.9" font-weight="700">plugin std</text>

  <!-- Decorative brackets -->
  <text x="14" y="48" font-family="monospace" font-size="14" fill="#23c88a" opacity="0.2">{</text>
  <text x="100" y="48" font-family="monospace" font-size="14" fill="#23c88a" opacity="0.2">}</text>
</svg>
