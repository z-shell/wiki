version: 0.1
cli:
  version: 1.25.0
  shell_hooks:
    path_add:
      - "${workspace}/tools"
plugins:
  sources:
    - id: trunk
      uri: https://github.com/trunk-io/plugins
      ref: v1.7.6
merge:
  required_statuses:
    - Trunk Check
lint:
  disabled:
    - yamllint
    - terrascan
    - trufflehog
    - trivy
    - checkov
    - osv-scanner
    - renovate
    - shellcheck
    - taplo
    - hadolint
  enabled:
    - sort-package-json@3.6.1
    - oxipng@10.1.0
    - svgo@4.0.1
    - stylelint@17.7.0
    - git-diff-check@SYSTEM
    - actionlint@1.7.12
    - eslint@10.2.0
    - gitleaks@8.30.1
    - markdownlint@0.48.0
    - prettier@3.8.2
    - shfmt@3.6.0
  ignore:
    - linters: [ALL]
      paths:
        - i18n/**
        - build/**
        - static/**
        - .docusaurus/**
    - linters: [eslint]
      paths:
        - .trunk/config/*
    - linters: [gitleaks]
      paths:
        - docusaurus.config.ts
    - linters: [markdownlint]
      paths:
        - src/components/Markdown/*
actions:
  enabled:
    - trunk-upgrade-available
    - trunk-fmt-pre-commit
    - trunk-check-pre-push
    - trunk-cache-prune
    - trunk-announce
tools:
  enabled: []
  runtimes:
    - python
runtimes:
  enabled:
    - python@3.10.8
    - go@1.21.5
    - node@22.16.0
