version: 0.1
cli:
  version: 1.25.0
  shell_hooks:
    path_add:
      - "${workspace}/tools"
      - "${workspace}/node_modules/.bin"
plugins:
  sources:
    - id: trunk
      uri: https://github.com/trunk-io/plugins
      ref: v1.7.6
merge:
  required_statuses:
    - Trunk Check
lint:
  files:
    - name: mdx
      extensions: [mdx]
    - name: markdown
      extensions: [md, markdown]
  disabled:
    - yamllint
    - terrascan
    - trufflehog
    - trivy
    - checkov
    - osv-scanner
    - renovate
    - shellcheck
    - taplo
    - hadolint
  enabled:
    - lychee@0.23.0
    - bandit@1.9.4
    - black@26.3.1
    - isort@8.0.1
    - ruff@0.15.11
    - sort-package-json@3.6.1
    - oxipng@10.1.1
    - svgo@4.0.1
    - stylelint@SYSTEM
    - git-diff-check@SYSTEM
    - actionlint@1.7.12
    - eslint@SYSTEM
    - gitleaks@8.30.1
    - markdownlint@0.48.0
    - prettier@3.8.3
    - shfmt@3.6.0
    - frontmatter-linter@SYSTEM
  definitions:
    - name: stylelint
      environment:
        - name: PATH
          list: ["${workspace}/node_modules/.bin"]
    - name: eslint
      environment:
        - name: PATH
          list: ["${workspace}/node_modules/.bin"]
      commands:
        - name: lint
          version: ">=9.0.0"
          direct_configs:
            - eslint.config.js
            - eslint.config.mjs
            - eslint.config.cjs
            - eslint.config.ts
    - name: lychee
      files: [mdx, markdown, typescript, javascript, css, html]
      tools: [lychee]
      commands:
        - name: lint
          run: lychee --config .trunk/configs/.lychee.toml --root-dir . ${target}
          output: pass_fail
          success_codes: [0, 1]
          read_output_from: stdout
          direct_configs:
            - .trunk/configs/.lychee.toml
      environment:
        - name: GITHUB_TOKEN
    - name: frontmatter-linter
      files: [mdx]
      commands:
        - name: lint
          run: node scripts/validate-frontmatter.mjs ${target}
          output: regex
          parse_regex: "(?P<path>.*):(?P<line>\\d+):(?P<col>\\d+):\\s*(?P<severity>\\w+):\\s*(?P<message>.*)"
          success_codes: [0, 1]
  ignore:
    - linters: [ALL]
      paths:
        - i18n/**
        - build/**
        - static/**
        - .docusaurus/**
    - linters: [gitleaks]
      paths:
        - docusaurus.config.ts
    - linters: [markdownlint]
      paths:
        - src/components/Markdown/*
actions:
  enabled:
    - trunk-upgrade-available
    - trunk-fmt-pre-commit
    - trunk-check-pre-push
    - trunk-cache-prune
    - trunk-announce
  definitions: []
tools:
  definitions:
    - name: lychee
      runtime: rust
      known_good_version: 0.23.0
      download: lychee-download
      shims: [lychee]
  enabled: []
  runtimes:
    - python
downloads:
  - name: lychee-download
    downloads:
      - os: linux
        cpu: x86_64
        url: https://github.com/lycheeverse/lychee/releases/download/lychee-v${version}/lychee-x86_64-unknown-linux-gnu.tar.gz
        sha256: 1fcb6ccf10d04c22b8c5873c5b9cb7be32ee7423e12169d6f1a79a6f1962ef81
runtimes:
  enabled:
    - python@3.13.3
    - go@1.21.5
    - node@24.15.0
