# Lychee link checker configuration
# https://lychee.cli.rs/guides/config/

#############################  Display  ##############################

verbose = "warn"
no_progress = true
mode = "color"

#############################  Cache  ################################

cache = false
# max_cache_age = "7d"

#############################  Runtime  ##############################

max_redirects = 10
max_retries = 3
max_concurrency = 10
threads = 4

#############################  Requests  #############################

timeout = 30
retry_wait_time = 5
accept = ["100..=399", "403"]
user_agent = "Mozilla/5.0 (compatible; lychee/0.18; +https://github.com/z-shell/wiki)"
insecure = false
require_https = false
method = "get"


#############################  Exclusions  ###########################

# Don't check mail addresses
include_mail = false

# Don't check links inside code blocks
include_verbatim = false

# Skip missing input files
skip_missing = true

# Exclude all private/local IPs
exclude_all_private = true

# Exclude URLs from checking (regex patterns)
exclude = [
  'https://github.com/ohmyzsh/ohmyzsh/tree/master/plugins/ag',
  'https://github.com/ohmyzsh/ohmyzsh/tree/master/plugins/fd',
  # Social media — aggressive rate limiting / bot blocking
  'https?://(www\.)?twitter\.com',
  'https?://(www\.)?x\.com',
  'https?://(www\.)?linkedin\.com',
  'https?://(www\.)?facebook\.com',

  # YouTube — bot detection
  'https?://(www\.)?youtu(\.be|be\.com)',

  # Crowdin — requires authentication
  'https://digitalclouds\.crowdin\.com',

  # FontAwesome kit — requires authentication
  'https://kit\.fontawesome\.com',

  # Localhost references in docs
  'https?://localhost',
  'https?://127\.0\.0\.1',

  # Self-references (served by this project, not external)
  'https://(.*\.)?zshell\.dev',
  'https://.*\.pages\.dev',

  # Internal Docusaurus links (validated by Docusaurus build instead)
  '^/',
  '^\.\./',
  '^\./',
  '^file://',
  '#.*', # Skip anchor-only links

  # Docusaurus / static assets (often offloaded or handled by proxy)
  '^/cdn/',
  '^/img/',

  # Template variables in JS/TS/MDX (and URL-encoded versions)
  '\$\{.*\}',
  '\{\{.*\}\}',
  '\$%7B.*%7D',
  '%7B%7B.*%7D%7D',

  # GitHub specific "new" pages often return 404 or 403 to bots
  'https://github\.com/.*/(discussions|issues|pulls)/new',

  # GitHub Pages legacy
  'https://z-shell\.github\.io',

  # Placeholder / example domains in docs
  'https?://domain\.com',
  'https?://example\.(com|org|net)',

  # URL shorteners (ephemeral, rate-limited)
  'https://git\.io',

  # Google Drive (access-controlled)
  'https://drive\.google\.com',

  # Sourceforge (slow, intermittent timeouts)
  'https?://.*sourceforge\.(net|io)',

  # Wikipedia (rate limits automated requests)
  'https://en\.wikipedia\.org',

  # Asciinema (embeds, not navigational links)
  'https://asciinema\.org',
]

# Exclude paths from being checked (regex patterns)
exclude_path = [
  'node_modules',
  'build',
  'i18n',
  '\.docusaurus',
  '\.wrangler',
  '\.git/',
  'pnpm-lock\.yaml',
  'static/cdn',
]

# File extensions to check
extensions = ["mdx", "md", "tsx", "ts"]

#############################  Hosts  ################################

# GitHub has strict rate limits even with GITHUB_TOKEN
[hosts."github.com"]
concurrency = 4
request_interval = "1500ms"

[hosts."raw.githubusercontent.com"]
concurrency = 2
request_interval = "2000ms"

[hosts."gist.githubusercontent.com"]
concurrency = 2
request_interval = "2000ms"
