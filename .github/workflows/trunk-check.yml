---
name: "🔍 Trunk Check"
on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  checks: write
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  trunk_check:
    name: Trunk Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v6.0.0
        with:
          fetch-depth: 0

      - name: Setup dependencies
        uses: ./.trunk/setup-ci

      - name: Trunk Check
        uses: trunk-io/trunk-action@385694c03612503282470762496a7935f8d5f30e # v1.2.4
        with:
          cache: false
          # Run full link audit on schedule/dispatch, otherwise run standard incremental checks
          arguments: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'run lychee-audit' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
