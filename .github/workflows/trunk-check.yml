---
name: Trunk Code Quality
on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Trunk Code Quality
    permissions:
      actions: read
      checks: write
      contents: read
    uses: z-shell/.github/.github/workflows/trunk.yml@8ee041623cd5a2892887357ea9f0fb443ff3d2b4 # main
    with:
      cache: false
      setup-deps: true
      # Run full link audit on schedule/dispatch, otherwise run standard incremental checks.
      arguments: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'run lychee-audit' || '' }}
