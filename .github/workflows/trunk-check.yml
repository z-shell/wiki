---
name: "⭕ Trunk [check]"
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    types: [opened, synchronize]
  schedule:
    - cron: "0 07 * * 5"
  workflow_dispatch: {}
  merge_group: {}

jobs:
  check:
    if: github.event.schedule != '0 07 * * 5'
    name: "⚡"
    uses: z-shell/.github/.github/workflows/trunk.yml@3e21fd8ea5d818c5fc6149cac9357b1502260d5f # main
    with:
      node_version: "lts/*"
      pnpm_arguments: "pnpm i && pnpm run build"
  upload:
    if: github.event.schedule == '0 07 * * 5'
    name: "🆙"
    uses: z-shell/.github/.github/workflows/trunk.yml@3e21fd8ea5d818c5fc6149cac9357b1502260d5f # main
    secrets:
      trunk-token: ${{ secrets.TRUNK_TOKEN }}
    with:
      node_version: "lts/*"
      pnpm_arguments: "pnpm i && pnpm run build"
