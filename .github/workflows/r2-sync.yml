---
name: "🔄 R2 Sync"
on:
  push:
    branches: [main]
    paths:
      - "static/**"
      - ".github/workflows/r2-sync.yml"
  workflow_dispatch:
    inputs:
      full_sync:
        description: "Upload all static assets (ignore diff)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    if: github.repository == 'z-shell/wiki'
    runs-on: ubuntu-latest
    environment: R2
    steps:
      - name: "⤵️ Check out code from GitHub"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
      - name: "⎔ Setup Node.js"
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
      - name: "📦 Install wrangler"
        run: npm install -g wrangler@4.13.2
      - name: "📋 Detect changed assets"
        id: detect
        run: |
          full_sync="${{ inputs.full_sync }}"
          if [ "$full_sync" = "true" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            find static/img static/cdn -type f 2>/dev/null > /tmp/changed_files.txt
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "mode=incremental" >> "$GITHUB_OUTPUT"
            git diff --name-only --diff-filter=ACM HEAD~1 HEAD -- 'static/img/**' 'static/cdn/**' > /tmp/changed_files.txt
          else
            echo "mode=full" >> "$GITHUB_OUTPUT"
            : > /tmp/changed_files.txt
            for d in static/img static/cdn; do
              [ -d "$d" ] && find "$d" -type f >> /tmp/changed_files.txt
            done
          fi
          count=$(wc -l < /tmp/changed_files.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Detected $count file(s) to upload"
      - name: "⏫ Sync static assets to R2"
        if: steps.detect.outputs.count != '0'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          bucket="r2-store"
          upload_concurrency=8
          max_retries=3
          threshold=512000
          uploaded=0
          failed=0
          offload_list="$(mktemp)"
          results_dir="$(mktemp -d)"
          echo "::group::Uploading to $bucket (${{ steps.detect.outputs.mode }} mode)"
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            key="${file#static/}"
            echo "$file" >> "$results_dir/queue.txt"
          done < /tmp/changed_files.txt
          if [ -s "$results_dir/queue.txt" ]; then
            xargs -a "$results_dir/queue.txt" -r -P "$upload_concurrency" -I{} bash -c '
              file="$1"
              bucket="$2"
              max_retries="$3"
              results_dir="$4"
              key="${file#static/}"
              result_file="$results_dir/$(echo "$key" | tr "/" "_")"
              attempt=0
              while [ "$attempt" -lt "$max_retries" ]; do
                attempt=$((attempt + 1))
                if [ "$attempt" -eq "$max_retries" ]; then
                  if wrangler r2 object put "$bucket/$key" --file="$file" --cc "public, max-age=31536000, immutable" > /dev/null; then
                    printf "success\t%s\n" "$key" > "$result_file"
                    exit 0
                  fi
                else
                  if wrangler r2 object put "$bucket/$key" --file="$file" --cc "public, max-age=31536000, immutable" > /dev/null 2>&1; then
                    printf "success\t%s\n" "$key" > "$result_file"
                    exit 0
                  fi
                  sleep "$((attempt * 2))"
                fi
              done
              printf "failure\t%s\n" "$key" > "$result_file"
            ' _ "{}" "$bucket" "$max_retries" "$results_dir"
          fi
          for f in "$results_dir"/*; do
            [ -f "$f" ] && [ "$f" != "$results_dir/queue.txt" ] || continue
            IFS=$'\t' read -r status key < "$f"
            [ -n "$key" ] || continue
            if [ "$status" = "success" ]; then
              echo "✓ $key"
              uploaded=$((uploaded + 1))
              file="static/$key"
              size=$(stat --printf='%s' "$file" 2>/dev/null || echo 0)
              if [ "$size" -gt "$threshold" ]; then
                echo "$file" >> "$offload_list"
              fi
            else
              echo "::warning::Failed to upload $key"
              failed=$((failed + 1))
            fi
          done
          rm -rf "$results_dir"
          echo "::endgroup::"
          {
            echo "### R2 Sync Summary"
            echo "- 📋 **Mode:** ${{ steps.detect.outputs.mode }}"
            echo "- ✅ **Uploaded:** $uploaded"
            echo "- ❌ **Failed:** $failed"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$failed" -gt 0 ]; then
            exit 1
          fi

          echo "OFFLOAD_LIST=$offload_list" >> "$GITHUB_ENV"

      - name: "🗑️ Offload large files from repository"
        if: success()
        run: |
          offload_list="${OFFLOAD_LIST:-}"
          if [ ! -f "$offload_list" ] || [ ! -s "$offload_list" ]; then
            echo "No large files to offload"
            exit 0
          fi

          count=0
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            size=$(stat --printf='%s' "$file" 2>/dev/null || echo 0)
            size_kb=$((size / 1024))
            echo "Removing $file (${size_kb}KB) — served from R2"
            git rm "$file"
            count=$((count + 1))
          done < "$offload_list"
          rm -f "$offload_list"

          if [ "$count" -eq 0 ]; then
            echo "No files to offload"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: offload ${count} large file(s) to R2

          Files above 500KB are uploaded to R2 and served via Functions proxy.
          This keeps the repository lean while assets remain available at their original URLs."
          git push

          {
            echo "### 🗑️ Offloaded Files"
            echo "Removed **$count** file(s) from repository (now served from R2)"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: "✅ Nothing to sync"
        if: steps.detect.outputs.count == '0'
        run: |
          echo "No static asset changes detected — skipping upload."
          echo "### R2 Sync Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- 📋 **Mode:** incremental" >> "$GITHUB_STEP_SUMMARY"
          echo "- ⏭️ **Skipped:** no changes in static/img or static/cdn" >> "$GITHUB_STEP_SUMMARY"
