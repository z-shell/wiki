---
name: "🔗 Link Checker"

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "community/**"
      - "ecosystem/**"
      - "blog/**"
      - "src/pages/**"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-links:
    name: 🔗 Check Links
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: "⤵️ Check out code from GitHub"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: "🔗 Lychee Link Checker"
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept 100..=399
            --exclude-loopback
            --timeout 30
            --max-retries 3
            --max-concurrency 10
            "./docs/**/*.mdx"
            "./community/**/*.mdx"
            "./ecosystem/**/*.mdx"
            "./blog/**/*.mdx"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
